name: tap-next

# Compose de desenvolvimento/local: builda a imagem a partir deste repo
# (Dockerfile multi-stage: expo export → nginx). Para rodar a imagem
# publicada no Docker Hub (kasparov/CasaOS), veja docs/DEPLOY.md.
services:
  tap-next:
    build: .
    image: tap-next:local
    container_name: tap-next
    restart: unless-stopped
    ports:
      - "8090:80"
    # Container imutável — sem volumes nem env; os dados do usuário vivem no
    # browser (localStorage) e saem pelo export JSON.
