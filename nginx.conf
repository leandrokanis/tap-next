# Tap Next — PWA estática (ADR 0007).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/manifest+json image/svg+xml audio/wav;

    types {
        application/manifest+json webmanifest;
    }

    # O service worker precisa revalidar a cada visita — é ele que puxa
    # versões novas do app (bump da constante CACHE).
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }

    # Bundles/asset com hash no nome: imutáveis.
    location /_expo/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA: qualquer rota cai no shell.
    location / {
        try_files $uri /index.html;
    }
}
