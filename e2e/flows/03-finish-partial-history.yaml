# Funcionalidade: Encerrar no meio e histórico
#   Cenário: salvar uma sessão parcial e encontrá-la no histórico
#     Dado que estou numa sessão com uma série feita
#     Quando toco em Encerrar e escolho "Save and exit"
#     Então volto para a Home
#     E o histórico mostra a sessão como parcial
#
# Nota: botões de Alert nativos são localizados; este flow assume
# simulador em inglês (locale padrão do CI).
appId: com.leandrokanis.tapnext
---
- launchApp:
    clearState: true
- tapOn:
    id: "go-import"
- tapOn:
    id: "load-sample"
- tapOn:
    id: "do-import"
- tapOn: "OK"
- tapOn:
    id: "workout-Pernas A"
- tapOn:
    id: "next-button"
- tapOn:
    id: "finish-button"
- tapOn: "Save and exit"
- assertVisible:
    id: "home-screen"
- tapOn:
    id: "go-history"
- assertVisible:
    id: "history-screen"
- assertVisible: "partial"
- assertVisible: "Pernas A"
