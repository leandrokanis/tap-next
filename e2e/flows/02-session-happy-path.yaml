# Funcionalidade: Sessão guiada v2 (Preparação-first, ADR 0006)
#   Cenário: toda série passa pela Preparação; descanso sem edição
#     Dado que importei "Pernas A"
#     Quando abro o treino e toco em INICIAR
#     Então vejo a Preparação do Agachamento (rodas de ajuste)
#     Quando toco em INICIAR
#     Então a execução da série 1 começa
#     Quando toco em PRÓXIMO
#     Então o descanso começa, com a série gravada e sem edição
#     Quando toco em INICIAR PRÓXIMO (pular descanso)
#     Então abre a Preparação da série 2
#     Quando toco em INICIAR
#     Então volto para a execução na série 2
appId: com.leandrokanis.tapnext
---
- launchApp:
    clearState: true
- assertVisible:
    id: "home-screen"
- tapOn:
    id: "go-import"
- tapOn:
    id: "load-sample"
- tapOn:
    id: "do-import"
- tapOn: "OK"
- tapOn:
    id: "workout-Pernas A"
- assertVisible:
    id: "workout-detail-screen"
- tapOn:
    id: "start-session"
- assertVisible:
    id: "session-screen"
- assertVisible:
    id: "prepare-phase"
- assertVisible: "Agachamento"
- tapOn:
    id: "prepare-start"
- assertVisible:
    id: "work-phase"
- tapOn:
    id: "next-button"
- assertVisible:
    id: "rest-phase"
- assertVisible:
    id: "set-log"
- tapOn:
    id: "skip-rest"
- assertVisible:
    id: "prepare-phase"
- tapOn:
    id: "prepare-start"
- assertVisible:
    id: "work-phase"
