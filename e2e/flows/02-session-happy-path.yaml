# Funcionalidade: Sessão guiada
#   Cenário: série por reps avança com o botão Próximo e inicia o descanso
#     Dado que importei "Pernas A"
#     Quando abro o treino e toco em INICIAR
#     Então vejo o Agachamento na série 1
#     Quando toco em PRÓXIMO
#     Então o descanso começa e o próximo set aparece editável (prospectivo)
#     Quando toco em INICIAR PRÓXIMO (pular descanso)
#     Então volto para a execução na série 2
appId: com.leandrokanis.tapnext
---
- launchApp:
    clearState: true
- assertVisible:
    id: "home-screen"
- tapOn:
    id: "go-import"
- tapOn:
    id: "load-sample"
- tapOn:
    id: "do-import"
- tapOn: "OK"
- tapOn:
    id: "workout-Pernas A"
- assertVisible:
    id: "workout-detail-screen"
- tapOn:
    id: "start-session"
- assertVisible:
    id: "session-screen"
- assertVisible:
    id: "work-phase"
- assertVisible: "Agachamento"
- tapOn:
    id: "next-button"
- assertVisible:
    id: "rest-phase"
- assertVisible:
    id: "set-log"
- tapOn:
    id: "log-reps-minus"
- tapOn:
    id: "next-button"
- assertVisible:
    id: "work-phase"
