# Funcionalidade: Importar treino (paste-only, RF-13)
#   Cenário: colar um JSON válido cria o treino na lista
#     Dado que abri o Tap Next pela primeira vez
#     Quando colo o JSON de exemplo e toco em Importar
#     Então "Pernas A" aparece na lista de treinos
#   Cenário: JSON com erro mostra campo, linha e coluna, e Importar desabilita
#     Quando o conteúdo tem "sets": 0
#     Então o erro aparece com linha e coluna e o Importar não conclui
appId: com.leandrokanis.tapnext
---
- launchApp:
    clearState: true
- assertVisible:
    id: "home-screen"
- tapOn:
    id: "go-import"
- assertVisible:
    id: "import-screen"
- tapOn:
    id: "load-sample"
- tapOn:
    id: "do-import"
- tapOn: "OK"
- assertVisible:
    id: "workout-Pernas A"
